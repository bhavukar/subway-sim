name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: subway-sim.exe
            asset_name: subway-sim-windows.exe
          - os: macos-latest
            artifact_name: subway-sim
            asset_name: subway-sim-macos

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd subway-sim
          cargo build --release --features vendored
        shell: pwsh

      - name: Build (MacOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd subway-sim
          cargo build --release
        shell: bash

      - name: Upload Binary to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: subway-sim/target/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
